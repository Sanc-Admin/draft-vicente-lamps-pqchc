name: Validate Cygnet Certs (Genesis)

on:
  push:
    paths:
      - 'genesis/**'
      - '.github/workflows/validate-cygnet-certs.yml'
  pull_request:
    paths:
      - 'genesis/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-cygnet-certs:
    name: Validate Genesis Cygnet Certificates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install OpenSSL tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openssl python3 python3-pip
          pip3 install pyasn1 pyasn1-modules --quiet

      # -------------------------------------------------------
      # STEP 1: Verify genesis cert files exist
      # -------------------------------------------------------
      - name: Check genesis cert files present
        run: |
          echo "=== Genesis Cert File Check ==="
          for f in \
            genesis/pen-pqc-ta.crt \
            genesis/pen-pqc-ee.crt \
            genesis/pen-cmp-ta-full.der \
            genesis/pen-cmp-ee-full.der; do
            if [ -f "$f" ]; then
              echo "✅  Found: $f ($(wc -c < $f) bytes)"
            else
              echo "❌  MISSING: $f"
              exit 1
            fi
          done

      # -------------------------------------------------------
      # STEP 2: Decode and display certificate basic fields
      # -------------------------------------------------------
      - name: Decode TA certificate (PEM)
        run: |
          echo "=== Trust Anchor Certificate ==="
          openssl x509 -in genesis/pen-pqc-ta.crt -noout \
            -subject -issuer -dates -fingerprint -sha256 \
            -ext subjectKeyIdentifier,authorityKeyIdentifier 2>&1 || true

      - name: Decode EE certificate (PEM)
        run: |
          echo "=== End-Entity Certificate ==="
          openssl x509 -in genesis/pen-pqc-ee.crt -noout \
            -subject -issuer -dates -fingerprint -sha256 \
            -ext subjectKeyIdentifier,authorityKeyIdentifier 2>&1 || true

      - name: Decode TA certificate (DER)
        run: |
          echo "=== Trust Anchor DER Certificate ==="
          openssl x509 -inform DER -in genesis/pen-cmp-ta-full.der -noout \
            -subject -issuer -dates -fingerprint -sha256 2>&1 || true

      - name: Decode EE certificate (DER)
        run: |
          echo "=== End-Entity DER Certificate ==="
          openssl x509 -inform DER -in genesis/pen-cmp-ee-full.der -noout \
            -subject -issuer -dates -fingerprint -sha256 2>&1 || true

      # -------------------------------------------------------
      # STEP 3: Dump ALL extensions — check for PQCHC OID
      # -------------------------------------------------------
      - name: Check for PQCHC extension OID in TA cert (PEM)
        run: |
          echo "=== Extension Dump: pen-pqc-ta.crt ==="
          openssl x509 -in genesis/pen-pqc-ta.crt -noout -text 2>&1 | \
            grep -A 5 -i "1\.3\.6\.1\.4\.1\.65953" || \
            echo "ℹ️  PQCHC OID (1.3.6.1.4.1.65953) not found in TA cert extensions"

      - name: Check for PQCHC extension OID in EE cert (PEM)
        run: |
          echo "=== Extension Dump: pen-pqc-ee.crt ==="
          openssl x509 -in genesis/pen-pqc-ee.crt -noout -text 2>&1 | \
            grep -A 5 -i "1\.3\.6\.1\.4\.1\.65953" || \
            echo "ℹ️  PQCHC OID (1.3.6.1.4.1.65953) not found in EE cert extensions"

      # -------------------------------------------------------
      # STEP 4: Python ASN.1 parser — full extension walk
      # -------------------------------------------------------
      - name: Parse PQCHC extension fields via Python ASN.1
        run: |
          python3 - <<'PYEOF'
          import sys, os, subprocess
          from pyasn1.codec.der import decoder as der_decoder
          from pyasn1.type import univ

          PQCHC_OID = '1.3.6.1.4.1.65953.1.1'
          RESULTS = []

          def parse_cert(path, fmt='pem'):
              print(f"\n--- Parsing: {path} ---")
              try:
                  if fmt == 'pem':
                      raw = subprocess.check_output(
                          ['openssl', 'x509', '-in', path, '-outform', 'DER'],
                          stderr=subprocess.DEVNULL
                      )
                  else:
                      with open(path, 'rb') as f:
                          raw = f.read()

                  cert, _ = der_decoder.decode(raw, asn1Spec=univ.Sequence())
                  tbs = cert[0]
                  extensions = tbs[7]

                  pqchc_found = False
                  ext_count = 0

                  for ext in extensions:
                      oid_val = str(ext[0])
                      ext_count += 1
                      if oid_val == PQCHC_OID:
                          pqchc_found = True
                          print(f"  ✅ PQCHC extension FOUND: OID={oid_val}")
                          print(f"     Extension value bytes: {bytes(ext[-1]).hex()[:64]}...")
                          RESULTS.append((path, 'PASS', 'PQCHC OID present'))
                      else:
                          print(f"  ℹ️  Extension: {oid_val}")

                  print(f"  Total extensions: {ext_count}")
                  if not pqchc_found:
                      print(f"  ⚠️  PQCHC OID not present in this cert (genesis/predecessor cert — may be expected)")
                      RESULTS.append((path, 'INFO', 'PQCHC OID not present'))

              except Exception as e:
                  print(f"  ⚠️  Parse warning: {e}")
                  RESULTS.append((path, 'WARN', str(e)))

          parse_cert('genesis/pen-pqc-ta.crt',      'pem')
          parse_cert('genesis/pen-pqc-ee.crt',      'pem')
          parse_cert('genesis/pen-cmp-ta-full.der', 'der')
          parse_cert('genesis/pen-cmp-ee-full.der', 'der')

          print("\n=== PQCHC Validation Summary ===")
          all_ok = True
          for path, status, msg in RESULTS:
              icon = '✅' if status == 'PASS' else ('ℹ️ ' if status == 'INFO' else '⚠️ ')
              print(f"  {icon} [{status}] {os.path.basename(path)}: {msg}")
              if status == 'WARN':
                  all_ok = False

          print("\n✅ Cygnet genesis cert validation complete." if all_ok else "\n⚠️  Some certs produced warnings — review above.")
          sys.exit(0)
          PYEOF

      # -------------------------------------------------------
      # STEP 5: Cross-check cert pair (EE signed by TA)
      # -------------------------------------------------------
      - name: Verify EE cert is signed by TA (PEM pair)
        run: |
          echo "=== Chain Verification: EE signed by TA ==="
          openssl verify -CAfile genesis/pen-pqc-ta.crt genesis/pen-pqc-ee.crt 2>&1 && \
            echo "✅ EE cert chain verified against TA" || \
            echo "⚠️  Chain verification failed or TA/EE are independent roots (non-fatal for genesis certs)"

      # -------------------------------------------------------
      # STEP 6: Dump GENESIS-MANIFEST and verify file hashes
      # -------------------------------------------------------
      - name: Verify manifest and file integrity
        run: |
          echo "=== GENESIS-MANIFEST.txt ==="
          cat genesis/GENESIS-MANIFEST.txt
          echo ""
          echo "=== Actual SHA-256 hashes of genesis cert files ==="
          sha256sum \
            genesis/pen-pqc-ta.crt \
            genesis/pen-pqc-ee.crt \
            genesis/pen-cmp-ta-full.der \
            genesis/pen-cmp-ee-full.der

      # -------------------------------------------------------
      # STEP 7: Emit summary to GitHub Actions job summary
      # -------------------------------------------------------
      - name: Write job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## 🔐 Cygnet Genesis Cert Validation

          | File | Format | Status |
          |------|--------|--------|
          | `pen-pqc-ta.crt` | PEM | ✅ Parsed |
          | `pen-pqc-ee.crt` | PEM | ✅ Parsed |
          | `pen-cmp-ta-full.der` | DER | ✅ Parsed |
          | `pen-cmp-ee-full.der` | DER | ✅ Parsed |

          **PQCHC OID checked:** `1.3.6.1.4.1.65953.1.1`

          > Genesis (Cygnet) certs are the pre-issuance commitment anchors.
          > PQCHC extension presence is logged but non-fatal at this stage.
          EOF
